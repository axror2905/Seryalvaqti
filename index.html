<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Realms</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:#0b0b0b;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
padding:12px;
margin:8px;
font-size:16px;
border-radius:10px;
border:none;
}

.panel{
margin-top:15px;
padding:10px;
border:1px solid #333;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🐉 Dragon Realms</h1>

<div>
💰 Gold: <span id="gold">500</span> |
🍎 Food: <span id="food">200</span> |
💎 Premium: <span id="gem">5</span>
</div>

<div class="panel">
<button onclick="breed()">🧬 Breed</button>
<button onclick="battle()">⚔ Battle</button>
<button onclick="showDragons()">🐉 Dragons</button>
<button onclick="farmFood()">🍎 Grow Food</button>
</div>

<div id="output" class="panel"></div>

<script>

// ===== PLAYER DATA =====

let gold = parseInt(localStorage.getItem("gold")) || 500
let food = parseInt(localStorage.getItem("food")) || 200
let gem = parseInt(localStorage.getItem("gem")) || 5

let dragons = JSON.parse(localStorage.getItem("dragons")) || []

// ===== DRAGON TYPES =====

const dragonTypes = [

{name:"Leaf Dragon",type:"Common",power:10},

{name:"Fire Dragon",type:"Common",power:12},

{name:"Water Dragon",type:"Rare",power:20},

{name:"Storm Dragon",type:"Rare",power:25},

{name:"Crystal Dragon",type:"Epic",power:40},

{name:"Shadow Dragon",type:"Epic",power:45},

{name:"Ancient Dragon",type:"Legendary",power:70}

]

// ===== UPDATE UI =====

function updateUI(){

document.getElementById("gold").innerText = gold
document.getElementById("food").innerText = food
document.getElementById("gem").innerText = gem

localStorage.setItem("gold",gold)
localStorage.setItem("food",food)
localStorage.setItem("gem",gem)
localStorage.setItem("dragons",JSON.stringify(dragons))

}

updateUI()

// ===== BREED =====

function breed(){

let r = Math.random()

let dragon

if(r < 0.50) dragon = dragonTypes[0]

else if(r < 0.80) dragon = dragonTypes[2]

else if(r < 0.95) dragon = dragonTypes[4]

else dragon = dragonTypes[6]

dragons.push(dragon)

document.getElementById("output").innerHTML =
"🥚 Yangi dragon chiqdi: <b>" +
dragon.name +
"</b> (" +
dragon.type +
")"

updateUI()

}

// ===== SHOW DRAGONS =====

function showDragons(){

if(dragons.length == 0){

document.getElementById("output").innerHTML = "Sizda dragon yo'q"

return

}

let text = "<h3>Sizning dragonlaringiz:</h3>"

dragons.forEach(d=>{
text += d.name + " ("+d.type+")<br>"
})

document.getElementById("output").innerHTML = text

}

// ===== BATTLE =====

function battle(){

if(dragons.length == 0){

alert("Battle uchun dragon yo'q")

return

}

let win = Math.random()

if(win > 0.5){

gold += 100

document.getElementById("output").innerHTML =
"⚔ G'alaba! +100 gold"

}else{

document.getElementById("output").innerHTML =
"❌ Yutqazdingiz"

}

updateUI()

}

// ===== FARM =====

function farmFood(){

if(gold < 100){

alert("Gold yetarli emas")

return

}

gold -= 100

document.getElementById("output").innerHTML =
"🌱 Ekin ekildi... 10 soniyadan keyin hosil"

updateUI()

setTimeout(()=>{

food += 100

document.getElementById("output").innerHTML =
"🍎 100 food tayyor!"

updateUI()

},10000)

}

</script>

</body>
</html>
